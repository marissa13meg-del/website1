<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>

    <style>
        body{
            margin:0;
            font-family:"Comic Sans MS", cursive;
            text-align:center;
            background: linear-gradient(135deg,#ffd6e8,#c8f7ff);
        }

        h1{
            color:#ff6fa5;
            margin-top:30px;
        }

        p{
            color:#555;
        }

        .gallery{
            display:grid;
            grid-template-columns: repeat(2, 1fr);
            gap:20px;
            max-width:600px;
            margin:40px auto;
            padding:20px;
        }

        .card{
            background:white;
            padding:15px;
            border-radius:20px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
            transition:0.2s;
        }

        .card:hover{
            transform:scale(1.03);
        }

        .card img{
            width:100%;
            height:160px;
            object-fit:cover;
            border-radius:15px;
            cursor:pointer;
        }

        .label{
            margin-top:10px;
            font-weight:bold;
            color:#444;
        }
    </style>
</head>

<body>

    <h1>🎂 Welcome to the Gallery 🎂</h1>
    <p>Click on any image to explore ✨</p>

    <div class="gallery">

        <div class="card">
            <a href="Playlist.html">
                <img src="https://cdn.getmidnight.com/b5a0b552ae89a91aa34705031852bd16/size/w600/2022/08/1_1---2022-08-24T165236.013-1.png">
            </a>
            <div class="label">Playlist</div>
        </div>

        <div class="card">
            <a href="Velroy_menu.html">
                <img src="https://previews.123rf.com/images/captainvector/captainvector2207/captainvector220710547/189077346-menu-logo-icon.jpg">
            </a>
            <div class="label">Veilyo's Menu</div>
        </div>

        <div class="card">
            <a href="Bdaywish.html">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQLicwC2oIpIs3PBHTr6iUM2kVtyIfzMMfBn5Ovw8hK8Q&s">
            </a>
            <div class="label">Bday Wish</div>
        </div>

        <div class="card">
            <a href="wiki.html">
                <img src="wp.jpg">
            </a>
            <div class="label">Veilyo Wikipedia</div>
        </div>

    </div>

</body>
</html>
