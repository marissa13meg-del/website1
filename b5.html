<!DOCTYPE html>
<html>
<head>
    <title>Photo Viewer</title>

    <style>

        body{
            margin:0;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;

            background-image: url("redbc.jpg");

            font-family:'Trebuchet MS', sans-serif;
        }

        .image-card{
            background:white;
            padding:5px;
            border-radius:25px;
            box-shadow:0 15px 35px rgba(0,0,0,0.15);
        }

        .click-img{
            width:300px;
            height:550px;
            object-fit:cover;

            border-radius:18px;
            cursor:pointer;

            transition:0.3s;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .click-img:hover{
            transform:scale(1.03);
        }

        .selected{
            box-shadow:0 0 30px gold;
            border:4px solid gold;
        }

        .next-btn{
            margin-top:35px;

            background:#ff8f6b;
            color:white;

            text-decoration:none;

            padding:14px 35px;
            border-radius:50px;

            font-size:18px;
            font-weight:bold;

            transition:0.3s;

            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .next-btn:hover{
            background:#ff744c;
            transform:translateY(-3px);
        }

    </style>
</head>

<body>

    <div class="image-card">
        <img
            src="2j.png"
            alt="Image"
            class="click-img"
            onclick="this.classList.toggle('selected')">
    </div>

    <a href="gallery.html" class="next-btn">
        Home →
    </a>

</body>
</html>
